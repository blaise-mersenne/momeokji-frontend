name: Keep Supabase Alive

on:
  schedule:
    # 매일 오전 9시 (한국 시간 기준)
    # UTC 기준 00:00 = KST 09:00
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 활성화 (테스트용)

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Insert ping record
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive_log" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"pinged_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}')

          echo "INSERT 응답 코드: $response"
          echo "응답 내용: $(cat /tmp/response.json)"

          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Ping INSERT 성공"
          else
            echo "⚠️ INSERT 실패: $response"
            exit 1
          fi

      - name: Delete old ping records
        run: |
          response=$(curl -s -o /tmp/response2.json -w "%{http_code}" \
            -X DELETE \
            "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive_log?pinged_at=lt.$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json")

          echo "DELETE 응답 코드: $response"
          echo "✅ 오래된 ping 기록 삭제 완료"

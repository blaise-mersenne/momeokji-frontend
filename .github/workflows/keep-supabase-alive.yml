name: Keep Supabase Alive

on:
  schedule:
    # 매일 오전 9시 (한국 시간 기준)
    # UTC 기준 00:00 = KST 09:00
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 활성화 (테스트용)

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Query Supabase Database
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/restaurants?select=count&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: count=exact")

          echo "Supabase 응답 코드: $response"
          echo "응답 내용: $(cat /tmp/response.json)"

          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase DB 쿼리 정상 완료 — 비활성화 타이머 초기화됨"
          else
            echo "⚠️ 응답 코드 $response — Supabase 상태를 확인해 주세요."
            exit 1
          fi
